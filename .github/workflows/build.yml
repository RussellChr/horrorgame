name: Build and Release

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout vcpkg
        run: git clone https://github.com/Microsoft/vcpkg.git

      - name: Bootstrap vcpkg
        run: |
          cd vcpkg
          .\bootstrap-vcpkg.bat

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        id: cache-vcpkg
        with:
          path: |
            vcpkg/installed
            vcpkg/downloads
          key: vcpkg-${{ runner.os }}-sdl3-sdl3image-ffmpeg-v2

      - name: Install SDL3, SDL3_image and FFmpeg with vcpkg
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: |
          cd vcpkg
          .\vcpkg integrate install
          .\vcpkg install sdl3:x64-windows "sdl3-image[png,jpeg]:x64-windows" ffmpeg:x64-windows

      - name: Create build directory
        run: mkdir build

      - name: Configure with CMake
        shell: bash
        run: |
          cd build
          cmake -G "Visual Studio 17 2022" -A x64 \
            -DCMAKE_TOOLCHAIN_FILE=../vcpkg/scripts/buildsystems/vcpkg.cmake ..

      - name: Build Release
        run: |
          cd build
          cmake --build . --config Release

      - name: Prepare Windows package
        shell: bash
        run: |
          mkdir -p horrorgame-windows
          cp build/Release/horrorgame.exe horrorgame-windows/ || cp build/horrorgame.exe horrorgame-windows/
          cp -r assets horrorgame-windows/
          cp -r maps horrorgame-windows/

          # Copy all runtime DLLs installed by vcpkg (SDL3, SDL3_image, FFmpeg, etc.)
          cp vcpkg/installed/x64-windows/bin/*.dll horrorgame-windows/ 2>/dev/null || true

          # List what we copied
          ls -la horrorgame-windows/

      - name: Create release package
        shell: bash
        run: |
          7z a horrorgame-windows.zip horrorgame-windows/

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: horrorgame-windows
          path: horrorgame-windows.zip

  build-macos:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SDL3 (macOS)
        run: |
          brew install sdl3 sdl3_image ffmpeg cmake

      - name: Create build directory
        run: mkdir build

      - name: Configure with CMake
        run: |
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..

      - name: Build
        run: |
          cd build
          cmake --build . --config Release

      - name: Create macOS app bundle
        run: |
          mkdir -p horrorgame.app/Contents/MacOS
          mkdir -p horrorgame.app/Contents/Resources
          
          # Copy executable
          cp build/horrorgame horrorgame.app/Contents/MacOS/ || exit 1
          chmod +x horrorgame.app/Contents/MacOS/horrorgame
          
          # Copy assets
          cp -r assets horrorgame.app/Contents/MacOS/ || echo "Assets folder not found"
          
          # Create Info.plist
          cat > horrorgame.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>Metamorph</string>
              <key>CFBundleVersion</key>
              <string>1.0.0</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0.0</string>
              <key>CFBundleExecutable</key>
              <string>horrorgame</string>
              <key>CFBundleIdentifier</key>
              <string>com.russellchr.metamorph</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
          </dict>
          </plist>
          EOF

      - name: Create release package
        run: |
          zip -r horrorgame-macos.zip horrorgame.app/

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: horrorgame-macos
          path: horrorgame-macos.zip

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            horrorgame-windows/horrorgame-windows.zip
            horrorgame-macos/horrorgame-macos.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
